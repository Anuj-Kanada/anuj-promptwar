databases:
  - name: mindease-db
    databaseName: mindease_db
    user: mindease_user
    plan: free

services:
  - type: web
    name: mindease
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn mindease.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mindease-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
